name: Build CedarScan IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project CedarScan.xcodeproj \
            -scheme CedarScan \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/CedarScan.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir -p build/Payload
          cp -R "build/CedarScan.xcarchive/Products/Applications/CedarScan.app" build/Payload/
          cd build
          zip -qry CedarScan.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CedarScan-ipa
          path: build/CedarScan.ipa
