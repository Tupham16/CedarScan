name: CedarScan
options:
  bundleIdPrefix: com.cedar247
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  CedarScan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      testTargets: []
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedar247.cedarscan
        PRODUCT_NAME: CedarScan
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: CedarScan
        NSCameraUsageDescription: CedarScan cần dùng camera và cảm biến LiDAR để quét không gian 3D.
        # NSMicrophoneUsageDescription đã BỎ 2026-07-19 cùng luồng quay video khảo sát: chỗ duy
        # nhất dùng micro là VideoScanFlowView (đã xoá). ScanVideoRecorder của mesh mode chỉ dựng
        # AVAssetWriterInput video, không có input audio nào. Khai quyền cho tính năng không tồn
        # tại là thứ App Store sẽ hỏi, và người đọc plist sau này sẽ tưởng app còn ghi âm.
        # NẾU sau này thêm thuyết minh giọng nói cho mesh mode thì khai lại KÈM code thật —
        # thiếu purpose string lúc xin quyền là app CRASH.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
