name: CedarScan
options:
  bundleIdPrefix: com.cedar247
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
targets:
  CedarScan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    scheme:
      testTargets: []
    sources:
      - Sources
      - Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedar247.cedarscan
        PRODUCT_NAME: CedarScan
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: CedarScan
        NSCameraUsageDescription: CedarScan cần dùng camera và cảm biến LiDAR để quét không gian 3D.
        NSMicrophoneUsageDescription: CedarScan ghi âm khi quay video khảo sát để bạn có thể thuyết minh về căn nhà.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
